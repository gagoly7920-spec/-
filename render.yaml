services:
  - type: web
    name: insurance-product-chatbot
    env: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: insurance-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: insurance-db
    plan: free
