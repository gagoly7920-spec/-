{% extends "base.html" %}
{% block title %}홈 — 보험 상품 관리{% endblock %}

{% block content %}
<div class="hero">
  <h1>보험 상품 관리 시스템</h1>
  <p>엑셀 파일을 업로드하고, 상품 정보를 조회하고, AI에게 질문하세요.</p>

  <div class="card-grid">
    <a class="card" href="/upload">
      <div class="card-icon">📤</div>
      <h3>엑셀 업로드</h3>
      <p>상품 엑셀 파일을 DB에 적재합니다</p>
    </a>
    <a class="card" href="/products">
      <div class="card-icon">📋</div>
      <h3>상품 조회</h3>
      <p>상품코드·상품명으로 검색하고 담보 목록을 확인합니다</p>
    </a>
    <a class="card" href="/compare">
      <div class="card-icon">🔍</div>
      <h3>정합성 비교</h3>
      <p>두 상품의 담보 구성을 비교하고 차이를 확인합니다</p>
    </a>
    <a class="card" href="/chat">
      <div class="card-icon">🤖</div>
      <h3>AI 챗봇</h3>
      <p>자연어로 상품·담보 정보를 질문합니다</p>
    </a>
  </div>
</div>
{% endblock %}
