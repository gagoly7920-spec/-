{% extends "base.html" %}
{% block title %}업로드 결과{% endblock %}

{% block content %}
<h2>업로드 결과</h2>

<table class="table">
  <thead>
    <tr><th>파일명</th><th>결과</th><th>내용</th></tr>
  </thead>
  <tbody>
    {% for r in results %}
    <tr>
      <td>{{ r.파일명 }}</td>
      <td>
        {% if r.성공 %}
          <span class="badge badge-success">성공</span>
        {% else %}
          <span class="badge badge-error">실패</span>
        {% endif %}
      </td>
      <td>{{ r.메시지 }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<div style="margin-top:1.5rem; display:flex; gap:1rem">
  <a href="/upload" class="btn btn-secondary">추가 업로드</a>
  <a href="/products" class="btn btn-primary">상품 목록 보기</a>
</div>
{% endblock %}
